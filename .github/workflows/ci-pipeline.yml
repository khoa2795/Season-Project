name: CI Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  frontend-checks:
    name: Frontend lint and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend test loader dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend cart tests
        working-directory: frontend
        run: npm run test:cart

  backend-checks:
    name: Backend tests and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Build backend
        working-directory: backend
        run: npm run build

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=critical

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=critical

  docker-build:
    name: Build and publish backend image
    runs-on: ubuntu-latest
    needs:
      - frontend-checks
      - backend-checks
      - security-audit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image name
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPOSITORY_NAME="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "BACKEND_IMAGE=${REGISTRY}/${OWNER}/${REPOSITORY_NAME}-backend" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            --tag "${BACKEND_IMAGE}:${GITHUB_SHA}" \
            --tag "${BACKEND_IMAGE}:latest" \
            ./backend

      - name: Push backend image
        if: github.event_name != 'pull_request'
        run: |
          docker push "${BACKEND_IMAGE}:${GITHUB_SHA}"
          docker push "${BACKEND_IMAGE}:latest"
